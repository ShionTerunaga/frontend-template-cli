name: Sync Release Branch

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    build_release_artifacts:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            version: ${{ steps.version.outputs.version }}
            tag: ${{ steps.version.outputs.tag }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: main
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Resolve latest changelog version
              id: version
              run: |
                  VERSION=$(node --input-type=module -e "import { getLatestVersion } from './scripts/release/write-release-notes.mts'; process.stdout.write(getLatestVersion());")
                  TAG="v${VERSION}"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Prepare release artifacts
              run: pnpm build

            - name: Prepare release branch files
              env:
                  RELEASE_VERSION: ${{ steps.version.outputs.version }}
              run: |
                  rm -rf .release-dist
                  mkdir -p .release-dist
                  node scripts/write/release-package-json.mts .release-dist/package.json
                  cp LICENSE .release-dist/LICENSE
                  cp -R bin .release-dist/bin

            - name: Upload release artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: release-dist
                  path: .release-dist
                  if-no-files-found: error

    publish_release_branch:
        runs-on: ubuntu-latest
        needs: build_release_artifacts
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: main
                  persist-credentials: false

            - name: Download release artifacts
              uses: actions/download-artifact@v4
              with:
                  name: release-dist
                  path: .release-dist

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Publish release branch
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  RELEASE_SOURCE_DIR: ${{ github.workspace }}/.release-dist
              run: |
                  git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
                  rm -rf ../release-worktree
                  git worktree add --detach ../release-worktree

                  cd ../release-worktree
                  git checkout --orphan release
                  find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
                  cp -R "$RELEASE_SOURCE_DIR"/. .
                  git add .
                  git commit -m "chore: prepare release artifacts"
                  git push --force-with-lease origin HEAD:release

            - name: Fetch release branch
              run: |
                  git fetch origin release

            - name: Create git tag
              env:
                  VERSION: ${{ needs.build_release_artifacts.outputs.version }}
                  TAG: ${{ needs.build_release_artifacts.outputs.tag }}
              run: |
                  if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
                    echo "Tag $TAG already exists. Skipping."
                    exit 0
                  fi

                  RELEASE_SHA=$(git rev-parse origin/release)
                  git tag -a "$TAG" "$RELEASE_SHA" -m "$TAG"
                  git push origin "$TAG"

            - name: Sync GitHub Release Notes
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.build_release_artifacts.outputs.version }}
                  TARGET_SHA: origin/release
              run: |
                  node scripts/release/sync-github-release.mts
