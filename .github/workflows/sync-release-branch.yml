name: Sync Release Branch

on:
    pull_request_target:
        types:
            - closed
        branches:
            - main

permissions:
    contents: write

jobs:
    sync_release_branch:
        if:
            github.event.pull_request.merged == true &&
            startsWith(github.event.pull_request.head.ref, 'changeset-release/')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: main

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.18.3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Resolve version
              id: version
              run: |
                  VERSION=$(node -p 'require("./package.json").version')
                  TAG="v${VERSION}"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            - name: Checkout release branch from main
              run: |
                  git fetch origin main
                  git checkout -B release origin/main

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prepare release artifacts
              run: pnpm run build:release

            - name: Commit release artifacts
              run: |
                  git add -f bin

                  if git diff --cached --quiet; then
                    echo "No release artifact changes."
                    exit 0
                  fi

                  git commit -m "chore: prepare release artifacts"

            - name: Push release branch
              run: |
                  git push --force-with-lease origin HEAD:release

            - name: Create git tag
              env:
                  TAG: ${{ steps.version.outputs.tag }}
              run: |
                  if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
                    echo "Tag $TAG already exists. Skipping."
                    exit 0
                  fi

                  git tag -a "$TAG" -m "$TAG"
                  git push origin "$TAG"

            - name: Sync GitHub Release Notes
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  node scripts/release/sync-github-release.mts
