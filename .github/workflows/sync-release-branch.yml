name: Sync Release Branch

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  sync_release_branch:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward release branch to main
        run: |
          git fetch origin main

          if git ls-remote --exit-code --heads origin release >/dev/null 2>&1; then
            git fetch origin release
            git checkout -B release origin/release
            git merge --ff-only origin/main
          else
            git checkout -B release origin/main
          fi

          git push origin HEAD:release
